name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Safe Fixes and Build
        run: |
          if [ -f "app/build.gradle" ]; then
            # 1. تعديل إصدار الأندرويد الأدنى
            sed -i -E 's/(minSdkVersion|minSdk)([[:space:]]*=?[[:space:]]*)[0-9]+/\1\226/g' app/build.gradle
            
            # 2. حل تعارض BouncyCastle
            echo "" >> app/build.gradle
            echo "configurations.all {" >> app/build.gradle
            echo "    exclude group: 'org.bouncycastle', module: 'bcprov-jdk15on'" >> app/build.gradle
            echo "    exclude group: 'org.bouncycastle', module: 'bcpkix-jdk15on'" >> app/build.gradle
            echo "    exclude group: 'org.bouncycastle', module: 'bcutil-jdk15on'" >> app/build.gradle
            echo "}" >> app/build.gradle
            
            # 3. إضافة Material Components و Gson
            echo "" >> app/build.gradle
            echo "dependencies {" >> app/build.gradle
            echo "    implementation 'com.google.android.material:material:1.12.0'" >> app/build.gradle
            echo "    implementation 'com.google.code.gson:gson:2.10.1'" >> app/build.gradle
            echo "}" >> app/build.gradle
            
            # 4. تخطي فحوصات الكوتلن والواجهات التجريبية
            echo "" >> app/build.gradle
            echo "tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {" >> app/build.gradle
            echo "    kotlinOptions {" >> app/build.gradle
            echo "        freeCompilerArgs += ['-P', 'plugin:androidx.compose.compiler.plugins.kotlin:suppressKotlinVersionCompatibilityCheck=1.9.0']" >> app/build.gradle
            echo "        freeCompilerArgs += ['-opt-in=androidx.compose.material.ExperimentalMaterialApi']" >> app/build.gradle
            echo "        freeCompilerArgs += ['-opt-in=androidx.compose.material3.ExperimentalMaterial3Api']" >> app/build.gradle
            echo "    }" >> app/build.gradle
            echo "}" >> app/build.gradle
          fi

          # 5. تشغيل البناء النهائي
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: '**/*.apk'
