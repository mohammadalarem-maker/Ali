name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Force Fix minSdkVersion and Build
        run: |
          # البحث عن ملف build.gradle داخل مجلد app وتغيير أي 24 إلى 26 إجبارياً
          if [ -f "app/build.gradle" ]; then
            sed -i 's/minSdkVersion[[:space:]]*=[[:space:]]*24/minSdkVersion 26/g' app/build.gradle
            sed -i 's/minSdkVersion[[:space:]]*24/minSdkVersion 26/g' app/build.gradle
            sed -i 's/minSdk[[:space:]]*=[[:space:]]*24/minSdk 26/g' app/build.gradle
            sed -i 's/minSdk[[:space:]]*24/minSdk 26/g' app/build.gradle
            echo "Successfully updated minSdkVersion to 26 in app/build.gradle"
          fi

          # التأكد من وجود gradlew
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 8.7
          fi
          
          # البناء
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: '**/*.apk'
