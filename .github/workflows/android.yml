name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Safe Fixes and Build
        run: |
          if [ -f "app/build.gradle" ]; then
            # 1. تعديل إصدار الأندرويد الأدنى إلى 26 بشكل آمن
            sed -i -E 's/(minSdkVersion|minSdk)([[:space:]]*=?[[:space:]]*)[0-9]+/\1\226/g' app/build.gradle
            
            # 2. إضافة كود حل تعارض المكتبات بطرد النسخ القديمة في نهاية الملف
            cat << 'LINES' >> app/build.gradle

configurations.all {
    exclude group: 'org.bouncycastle', module: 'bcprov-jdk15on'
    exclude group: 'org.bouncycastle', module: 'bcpkix-jdk15on'
    exclude group: 'org.bouncycastle', module: 'bcutil-jdk15on'
}
LINES
            echo "Successfully applied safe adjustments to app/build.gradle"
          fi

          # 3. توليد ملف الـ wrapper إذا لم يكن موجوداً
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 8.7
          fi
          
          # 4. تشغيل البناء
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: '**/*.apk'
