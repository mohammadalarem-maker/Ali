name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Safe Fixes and Build
        run: |
          if [ -f "app/build.gradle" ]; then
            # 1. تعديل إصدار الأندرويد الأدنى إلى 26 بشكل آمن
            sed -i -E 's/(minSdkVersion|minSdk)([[:space:]]*=?[[:space:]]*)[0-9]+/\1\226/g' app/build.gradle
            
            # 2. إضافة كود حل تعارض المكتبات بأمان
            echo "" >> app/build.gradle
            echo "configurations.all {" >> app/build.gradle
            echo "    exclude group: 'org.bouncycastle', module: 'bcprov-jdk15on'" >> app/build.gradle
            echo "    exclude group: 'org.bouncycastle', module: 'bcpkix-jdk15on'" >> app/build.gradle
            echo "    exclude group: 'org.bouncycastle', module: 'bcutil-jdk15on'" >> app/build.gradle
            echo "}" >> app/build.gradle
            
            # 3. حقن مكتبة Material Components لحل مشكلة الثيمات
            echo "" >> app/build.gradle
            echo "dependencies {" >> app/build.gradle
            echo "    implementation 'com.google.android.material:material:1.12.0'" >> app/build.gradle
            echo "}" >> app/build.gradle
            
            # 4. تخطي فحص إصدار الكوتلن والـ Compose لضمان إتمام 컴ไพล์
            echo "" >> app/build.gradle
            echo "tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {" >> app/build.gradle
            echo "    kotlinOptions {" >> app/build.gradle
            echo "        freeCompilerArgs += ['-P', 'plugin:androidx.compose.compiler.plugins.kotlin:suppressKotlinVersionCompatibilityCheck=true']" >> app/build.gradle
            echo "    }" >> app/build.gradle
            echo "}" >> app/build.gradle
            
            echo "Successfully applied all safe adjustments and compatibility bypasses"
          fi

          # 5. توليد ملف الـ wrapper إذا لم يكن موجوداً
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 8.7
          fi
          
          # 6. تشغيل البناء النهائي
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: '**/*.apk'
